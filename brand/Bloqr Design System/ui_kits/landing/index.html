<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloqr — Internet Hygiene: Automated.</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);color:var(--fg-1);font-family:var(--font-display);min-height:100vh;}
  *{box-sizing:border-box;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
  a{color:inherit;}
  .demo-warning{
    position:sticky;top:0;z-index:200;
    padding:8px 12px;
    background:var(--bg-elevated);
    border-bottom:1px solid var(--border);
    color:var(--fg-2);
    font:500 12px/1.4 var(--font-display);
    text-align:center;
  }
  .modal-bg{position:fixed;inset:0;background:rgba(7,11,20,0.7);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:center;animation:fade 200ms var(--ease-out);}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
</style>
<!-- Local prototype only: these CDN scripts are for design preview convenience.
     Do not deploy this file as-is to production Bloqr properties. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="demo-warning">Local demo only. Uses CDN React/Babel for preview convenience — do not deploy as-is.</div>
<div id="root"></div>

<script type="text/babel" src="components/Primitives.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Problem.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>

<script type="text/babel">
function WaitlistModal({ onClose }) {
  const [email, setEmail] = React.useState('');
  const [done, setDone] = React.useState(false);
  const submit = (e) => {
    e.preventDefault();
    if (!/.+@.+\..+/.test(email)) return;
    setDone(true);
  };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'var(--bg-surface)', border:'1px solid var(--border)', borderRadius:16,
        padding:32, width:420, maxWidth:'90vw', position:'relative',
        boxShadow:'0 8px 32px rgba(0,0,0,0.6)',
      }}>
        <button onClick={onClose} style={{position:'absolute',top:14,right:14,background:'transparent',border:'none',color:'var(--fg-3)',fontSize:18,cursor:'pointer'}}>✕</button>
        {!done ? <>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.2em',color:'var(--orange-500)',textTransform:'uppercase',marginBottom:12}}>Join the waitlist</div>
          <h3 style={{fontSize:'1.5rem',fontWeight:800,letterSpacing:'-0.02em',margin:'0 0 10px',color:'var(--fg-1)'}}>We'll email you when early access opens.</h3>
          <p style={{fontSize:13,color:'var(--fg-2)',lineHeight:1.6,margin:'0 0 20px'}}>No marketing drip. No follow-ups. Just the launch email.</p>
          <form onSubmit={submit} style={{display:'flex',gap:8}}>
            <input value={email} onChange={e => setEmail(e.target.value)} placeholder="you@domain.com" type="email" required autoFocus
              style={{flex:1,background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',fontFamily:'var(--font-display)',fontSize:14,color:'var(--fg-1)',outline:'none'}}
              onFocus={e => e.currentTarget.style.borderColor = 'var(--orange-500)'}
              onBlur={e => e.currentTarget.style.borderColor = 'var(--border)'}/>
            <Button variant="primary" onClick={submit}>Join</Button>
          </form>
        </> : <>
          <div style={{fontSize:32,marginBottom:12}}>✓</div>
          <h3 style={{fontSize:'1.35rem',fontWeight:800,letterSpacing:'-0.02em',margin:'0 0 10px',color:'var(--fg-1)'}}>You're on the list.</h3>
          <p style={{fontSize:14,color:'var(--fg-2)',lineHeight:1.6,margin:'0 0 20px'}}>We'll be in touch.</p>
          <Button variant="outline" onClick={onClose}>Close</Button>
        </>}
      </div>
    </div>
  );
}

function App() {
  const [active, setActive] = React.useState('why');
  const [waitlist, setWaitlist] = React.useState(false);
  const open = () => setWaitlist(true);
  return (
    <>
      <Nav active={active} setActive={setActive} onWaitlist={open} />
      <Hero onWaitlist={open} />
      <Problem />
      <Features />
      <HowItWorks />
      <Pricing />
      <CtaBanner onWaitlist={open} />
      <Footer />
      {waitlist && <WaitlistModal onClose={() => setWaitlist(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
