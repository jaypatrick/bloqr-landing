<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--bg-base);color:var(--fg-1);font-family:var(--font-display);}
.card{padding:20px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.sw{border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:3px;min-height:100px;justify-content:flex-end;border:1px solid var(--border);}
.name{font-size:11px;font-weight:700;}
.hex{font-family:var(--font-mono);font-size:10px;opacity:0.8;}
.use{font-size:10px;opacity:0.7;}
.dark{color:#070B14;}
.light{color:var(--fg-1);}
</style></head><body>
<div class="card">
  <div class="sw dark" style="background:#FF7033"><span class="name">orange-400</span><span class="hex">#FF7033</span><span class="use">hover</span></div>
  <div class="sw dark" style="background:#FF5500;box-shadow:0 0 20px rgba(255,85,0,0.30)"><span class="name">orange-500</span><span class="hex">#FF5500</span><span class="use">primary</span></div>
  <div class="sw light" style="background:#CC4400"><span class="name">orange-600</span><span class="hex">#CC4400</span><span class="use">pressed</span></div>
  <div class="sw light" style="background:#1A0A00"><span class="name">orange-900</span><span class="hex">#1A0A00</span><span class="use">tinted surface</span></div>
  <div class="sw light" style="background:rgba(255,85,0,0.12);border:1px solid rgba(255,85,0,0.3)"><span class="name" style="color:var(--orange-500)">glow</span><span class="hex" style="color:var(--orange-500)">/0.15</span><span class="use" style="color:var(--fg-2)">shadows</span></div>
</div></body></html>
