<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bloqr — Type Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);color:var(--fg-1);font-family:var(--font-display);}
  .card{padding:28px 32px;min-height:150px;display:flex;flex-direction:column;justify-content:center;gap:10px;}
  .h1{font-size:56px;font-weight:800;letter-spacing:-0.03em;line-height:1.0;margin:0;}
  .h1 em{font-style:normal;background:linear-gradient(135deg,var(--orange-500) 0%,#FF8833 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:0.08em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="card">
  <div class="meta">Display · Space Grotesk 800 · clamp(2.5rem, 6vw, 4.5rem) · -0.03em</div>
  <h1 class="h1">Internet Hygiene:<br><em>Automated.</em></h1>
</div>
</body>
</html>
