<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bloqr — Eyebrow + Title</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);color:var(--fg-1);font-family:var(--font-display);}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:10px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange-500);}
  .title{font-size:38px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--fg-1);}
  .desc{font-size:15px;color:var(--fg-2);line-height:1.65;max-width:520px;font-family:var(--font-body);}
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">How it works</div>
  <div class="title">Point. Click. Done.</div>
  <div class="desc">No code required — ever. The UI builds everything for you. Curious what's under the hood? It's all there when you want it.</div>
</div>
</body>
</html>
