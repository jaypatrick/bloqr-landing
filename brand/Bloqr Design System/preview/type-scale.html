<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bloqr — Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);color:var(--fg-1);font-family:var(--font-display);}
  .card{padding:22px 32px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border-subtle);padding:6px 0;}
  .row:last-child{border:none;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:110px;letter-spacing:0.04em;}
  .sample{color:var(--fg-1);font-weight:700;letter-spacing:-0.02em;flex:1;line-height:1;}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="label">--text-7xl</span><span class="sample" style="font-size:56px">Bloqr</span><span class="px">72 / 56</span></div>
  <div class="row"><span class="label">--text-5xl</span><span class="sample" style="font-size:42px">Bloqr</span><span class="px">48</span></div>
  <div class="row"><span class="label">--text-4xl</span><span class="sample" style="font-size:32px">Bloqr</span><span class="px">36</span></div>
  <div class="row"><span class="label">--text-2xl</span><span class="sample" style="font-size:22px">Bloqr</span><span class="px">24</span></div>
  <div class="row"><span class="label">--text-lg</span><span class="sample" style="font-size:16px;font-weight:500">Bloqr</span><span class="px">18</span></div>
  <div class="row"><span class="label">--text-sm</span><span class="sample" style="font-size:13px;font-weight:400;color:var(--fg-2)">Bloqr</span><span class="px">14</span></div>
  <div class="row"><span class="label">--text-xs</span><span class="sample" style="font-size:11px;font-weight:400;color:var(--fg-3)">Bloqr</span><span class="px">12</span></div>
</div>
</body>
</html>
