<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--bg-base);color:var(--fg-1);font-family:var(--font-display);}
.card{padding:24px 32px;display:flex;flex-direction:column;gap:12px;}
.row{display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
.name{width:120px;color:var(--fg-1);font-weight:600;}
.val{color:var(--fg-3);}
.dot{width:10px;height:10px;border-radius:50%;background:var(--orange-500);animation:bounce 1.4s infinite;}
@keyframes bounce{0%,100%{transform:translateX(0);}50%{transform:translateX(80px);}}
.ease-out{animation-timing-function:cubic-bezier(0.16,1,0.3,1);}
.ease-in-out{animation-timing-function:cubic-bezier(0.45,0,0.55,1);animation-duration:1.8s;}
.fast{animation-duration:1.0s;}
</style></head><body>
<div class="card">
  <div class="row"><span class="name">--ease-out</span><span class="val">(0.16, 1, 0.3, 1)</span><div class="dot ease-out"></div></div>
  <div class="row"><span class="name">--ease-in-out</span><span class="val">(0.45, 0, 0.55, 1)</span><div class="dot ease-in-out"></div></div>
  <div class="row"><span class="name">--duration-fast</span><span class="val">150ms · hover</span></div>
  <div class="row"><span class="name">--duration-base</span><span class="val">250ms · state changes</span></div>
  <div class="row"><span class="name">--duration-slow</span><span class="val">400ms · larger transitions</span></div>
</div></body></html>
