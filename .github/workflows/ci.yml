name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Caches Astro's incremental build output (.astro/) so repeated builds
      # only recompile changed pages/components rather than the entire site.
      # Key is scoped to the OS, Node version, and a hash of all source files
      # so the cache is invalidated whenever any source file changes.
      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: .astro/
          key: astro-${{ runner.os }}-node22-${{ hashFiles('src/**', 'astro.config.*', 'tsconfig.json') }}
          restore-keys: |
            astro-${{ runner.os }}-node22-

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@placeholder/placeholder'
          BETTER_AUTH_SECRET: 'ci-placeholder-secret-not-used-in-build'
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
      - name: Verify dist is non-empty
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "ERROR: dist/client/index.html missing after build"
            exit 1
          fi
          HTML_COUNT=$(find dist/client -name "*.html" | wc -l)
          if [ "$HTML_COUNT" -lt 3 ]; then
            echo "ERROR: Only $HTML_COUNT HTML files in dist/client — expected at least 3 (index, 404, privacy policy etc.)"
            exit 1
          fi
          echo "dist/client/ OK — $(find dist -type f | wc -l) files, $HTML_COUNT HTML pages"

      - name: Validate Worker bundle (dry-run)
        # Validates wrangler.toml config and Worker bundling on every PR and push.
        # --dry-run skips the actual upload so no CF API token is needed here.
        run: |
          npx wrangler deploy --dry-run --outdir /tmp/wrangler-dry-run
          # Wrangler outputs .mjs (ESM) bundles; older versions may output .js
          WORKER_SIZE=$(find /tmp/wrangler-dry-run \( -name "*.js" -o -name "*.mjs" \) | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}')
          # 1000 bytes is a conservative floor — a valid Worker bundle with auth,
          # DB, and routing logic is >1 MB; anything smaller means the bundle is
          # empty or the dry-run output directory was not written correctly.
          MIN_WORKER_SIZE=1000
          if [ -z "$WORKER_SIZE" ] || [ "$WORKER_SIZE" -lt "$MIN_WORKER_SIZE" ]; then
            echo "ERROR: Worker bundle is suspiciously small ($WORKER_SIZE bytes, min $MIN_WORKER_SIZE) — something went wrong"
            exit 1
          fi
          echo "Worker bundle OK — $WORKER_SIZE bytes"

      - name: Validate wrangler.toml schema (advisory — does not fail build)
        continue-on-error: true
        run: |
          # Validate that wrangler.toml parses cleanly and all bindings are recognized.
          # This catches TOML syntax errors and unknown binding keys (e.g. [[browser_rendering]])
          # before they silently break a deployed binding.
          npx wrangler deploy --dry-run --outdir /tmp/wrangler-schema-check 2>&1 | tee /tmp/wrangler-schema-output.txt
          if grep -qi "error\|warning\|unknown field\|unrecognized" /tmp/wrangler-schema-output.txt; then
            echo "WARNING: wrangler reported errors or warnings during schema validation — review output above"
          fi
          echo "wrangler.toml schema validation complete"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-deploy
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify dist is not empty
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "ERROR: dist/client/index.html missing — build artifact is empty or corrupt. Aborting deploy."
            exit 1
          fi
          echo "dist/ OK — $(find dist -type f | wc -l) files"

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify deployment via Cloudflare API
        # Checks the Cloudflare Workers API to confirm the deploy succeeded and is
        # recent — avoids the live-URL curl that Cloudflare Bot Fight Mode blocks
        # (HTTP 403 "Just a moment..." from GitHub Actions runner IPs).
        #
        # Required secrets (repo Settings → Secrets → Actions):
        #   CLOUDFLARE_API_TOKEN — already used by the Deploy step above
        #   CF_ACCOUNT_ID        — Cloudflare account ID (dashboard sidebar → copy account ID)
        #                          NOTE: must be added manually; wrangler.toml has it commented out
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          echo "Waiting 15s for deployment to propagate..."
          sleep 15

          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "ERROR: CF_ACCOUNT_ID secret is not set."
            echo "Add it in repo Settings → Secrets → Actions."
            exit 1
          fi

          if ! command -v jq &>/dev/null; then
            echo "ERROR: jq is not installed on this runner. Install it or switch to Node-based JSON parsing."
            exit 1
          fi

          SCRIPT_NAME="adblock-landing"
          API_URL="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}/deployments"

          RESPONSE=$(curl --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --retry 3 --retry-delay 2 --retry-connrefused --retry-all-errors \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "${API_URL}")

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR: Cloudflare API returned success=false for worker '${SCRIPT_NAME}'"
            echo "Response: $RESPONSE"
            exit 1
          fi

          DEPLOY_COUNT=$(echo "$RESPONSE" | jq -r '.result.deployments | length // 0')
          if [ -z "$DEPLOY_COUNT" ] || [ "$DEPLOY_COUNT" -eq 0 ]; then
            echo "ERROR: .result.deployments is empty or missing — Cloudflare API response shape may have changed"
            echo "Response: $RESPONSE"
            exit 1
          fi

          CREATED_ON=$(echo "$RESPONSE" | jq -r '.result.deployments[0].created_on // empty')
          if [ -z "$CREATED_ON" ]; then
            echo "ERROR: Could not parse created_on from deployments[0] — API response may be empty or malformed"
            echo "Response: $RESPONSE"
            exit 1
          fi

          DEPLOY_EPOCH=$(date -d "$CREATED_ON" +%s)
          NOW_EPOCH=$(date +%s)
          AGE_SECONDS=$(( NOW_EPOCH - DEPLOY_EPOCH ))
          MAX_AGE=600  # 10 min — generous buffer for slow CF propagation and API lag

          if [ "$AGE_SECONDS" -gt "$MAX_AGE" ]; then
            echo "ERROR: Latest deployment is ${AGE_SECONDS}s old (max allowed: ${MAX_AGE}s)."
            echo "The deploy step may not have updated the Worker, or the API returned stale data."
            echo "Deployment created_on: $CREATED_ON"
            exit 1
          fi

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.result.deployments[0].id // "unknown"')
          echo "Deployment verified — id: ${DEPLOY_ID}, created_on: ${CREATED_ON}, age: ${AGE_SECONDS}s"
