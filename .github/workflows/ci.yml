name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@placeholder/placeholder'
          BETTER_AUTH_SECRET: 'ci-placeholder-secret-not-used-in-build'
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
      - name: Verify dist is non-empty
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "ERROR: dist/client/index.html missing after build"
            exit 1
          fi
          HTML_COUNT=$(find dist/client -name "*.html" | wc -l)
          if [ "$HTML_COUNT" -lt 3 ]; then
            echo "ERROR: Only $HTML_COUNT HTML files in dist/client — expected at least 3 (index, 404, privacy policy etc.)"
            exit 1
          fi
          echo "dist/client/ OK — $(find dist -type f | wc -l) files, $HTML_COUNT HTML pages"

      - name: Validate Worker bundle (dry-run)
        # Validates wrangler.toml config and Worker bundling on every PR and push.
        # --dry-run skips the actual upload so no CF API token is needed here.
        run: |
          npx wrangler deploy --dry-run --outdir /tmp/wrangler-dry-run
          # Wrangler outputs .mjs (ESM) bundles; older versions may output .js
          WORKER_SIZE=$(find /tmp/wrangler-dry-run \( -name "*.js" -o -name "*.mjs" \) | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}')
          # 1000 bytes is a conservative floor — a valid Worker bundle with auth,
          # DB, and routing logic is >1 MB; anything smaller means the bundle is
          # empty or the dry-run output directory was not written correctly.
          MIN_WORKER_SIZE=1000
          if [ -z "$WORKER_SIZE" ] || [ "$WORKER_SIZE" -lt "$MIN_WORKER_SIZE" ]; then
            echo "ERROR: Worker bundle is suspiciously small ($WORKER_SIZE bytes, min $MIN_WORKER_SIZE) — something went wrong"
            exit 1
          fi
          echo "Worker bundle OK — $WORKER_SIZE bytes"

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-deploy
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify dist is not empty
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "ERROR: dist/client/index.html missing — build artifact is empty or corrupt. Aborting deploy."
            exit 1
          fi
          echo "dist/ OK — $(find dist -type f | wc -l) files"

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
