name = "adblock-landing"
compatibility_date = "2026-01-01"

# ─── Static Assets (Workers — replaces pages_build_output_dir) ────────────────
assets = { directory = "./dist" }

# ─── Worker Entry Point ───────────────────────────────────────────────────────
main = "src/worker.ts"

# ─── Smart Placement ─────────────────────────────────────────────────────────
# Cloudflare automatically places the Worker to help reduce latency based on
# its Smart Placement heuristics and your application's traffic patterns.
[placement]
mode = "smart"

# ─── Observability (logging + metrics) ───────────────────────────────────────
# Enables Workers Trace Events / Logpush and built-in request metrics in the
# Cloudflare dashboard. No extra code changes required.
[observability]
enabled = true
head_sampling_rate = 1   # 1 = 100 % of requests sampled (adjust for high traffic)

# ─── Browser Rendering ────────────────────────────────────────────────────────
# Provides a headless Chromium instance at the edge for UI automation and
# visual regression tests.
# Usage: import puppeteer from '@cloudflare/puppeteer'
#        const browser = await puppeteer.launch(env.BROWSER)
# Requires Cloudflare Workers paid plan.
[[browser]]
binding = "BROWSER"

# ─── Route / Domain ──────────────────────────────────────────────────────────
# Uncomment and fill in once the Worker is promoted to production:
# routes = [{ pattern = "yourdomain.com/*", zone_name = "yourdomain.com" }]

# ─── Worker edge handlers ─────────────────────────────────────────────────────
# Routing is handled in src/worker.ts:
#   POST    /waitlist       → waitlist handler (Neon insert + Apollo sync)
#   OPTIONS /waitlist       → CORS preflight
#   GET     /config         → returns all site_config rows as { key: value } JSON
#   OPTIONS /config         → CORS preflight
#   POST    /admin/config   → updates a single site_config row (requires Authorization: Bearer)
#   OPTIONS /admin/config   → CORS preflight
#   *                       → env.ASSETS.fetch(request)  (static site)
#
# ─── Neon branch → DATABASE_URL mapping ──────────────────────────────────────
#   production  ep-winter-term-a8rxh2a9-pooler       → adblock-compiler (production CF secret)
#   staging     ep-polished-resonance-a8mefek3-pooler → adblock-compiler (staging CF secret)
#   dev/jayson  ep-round-recipe-a8b3d3bd-pooler      → adblock-compiler (.dev.vars)
#
# ─── Required secrets (set in CF dashboard OR .dev.vars for local dev) ────────
# Workers → adblock-landing → Settings → Environment variables
# Add each as type "Secret" (encrypted at rest):
#
#   DATABASE_URL   — Neon bloqr database connection string (branch-specific, see above; currently named adblock-compiler)
#   APOLLO_API_KEY — Apollo.io API key for contact enrichment
#   ADMIN_SECRET   — Random secret string for the /admin/config write endpoint
#                    (also used as the password on the /admin/config UI page)
#                    Generate with: openssl rand -hex 32
#
# Local dev: values live in .dev.vars (gitignored), then run:
#   npm run preview   →  wrangler dev
