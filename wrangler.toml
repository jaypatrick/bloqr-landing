name = "bloqr-landing"
compatibility_date = "2026-01-01"
# Node.js API compatibility — required by better-auth (node:async_hooks) and
# other packages that use Node.js built-in modules in the Worker runtime.
# DO NOT REMOVE unless those Node built-in dependencies are removed or replaced.
compatibility_flags = ["nodejs_compat"]

# ─── Account Configuration ────────────────────────────────────────────────────
# If your API token does not resolve the correct default account, uncomment
# account_id and set it explicitly using the Cloudflare account ID from the
# dashboard sidebar.
account_id = "07a1f8d207654fe5d838174af4813126"

# ─── Worker Entry Point ───────────────────────────────────────────────────────
main = "src/worker.ts"

# ─── Static Assets (Workers — replaces pages_build_output_dir) ────────────────
# ⚠️  DO NOT MODIFY THIS LINE — both `directory` AND `binding` are required.
# `binding = "ASSETS"` injects env.ASSETS into the Worker so env.ASSETS.fetch()
# works in src/worker.ts. Removing `binding` causes a 0 KB download on every
# request. The `assets = { ... }` inline form is correct — do NOT switch to the
# [assets] table form, which has caused repeated regressions (PRs #58, #64).
#
# WHY ./dist/client (not ./dist):
# The @astrojs/cloudflare adapter (output: 'server') splits its build output:
#   dist/client/  — prerendered HTML, CSS, JS, and all static assets (served via ASSETS)
#   dist/server/  — the SSR Worker bundle (entry point; not served as static files)
# Pointing at ./dist would upload an empty/wrong directory — ASSETS binding would
# show "—" in the CF dashboard and env.ASSETS.fetch() would return 404 on every request.
#
# ⚠️  DASHBOARD DANGER — Adding, editing, or deleting any variable or secret in
# the Cloudflare Workers dashboard creates a new Worker version with NO assets
# attached. The site will return 'Page not found' on every request.
# NEVER change variables/secrets from the CF dashboard UI.
# - Plain vars (ENVIRONMENT, CANONICAL_DOMAIN, etc.): edit [vars] below, push to main
# - Secrets (DATABASE_URL, APOLLO_API_KEY, etc.): use CLI only:
#     wrangler secret put SECRET_NAME
# If the dashboard was used accidentally, rollback immediately:
#   CF dashboard → bloqr-landing → Deployments → last Wrangler deploy → Rollback
# Then re-run CI to restore assets.
assets = { directory = "./dist/client", binding = "ASSETS" }

# ─── Smart Placement ──────────────────────────────────────────────────────────
# Cloudflare automatically places the Worker to help reduce latency based on
# its Smart Placement heuristics and your application's traffic patterns.
[placement]
mode = "smart"

# ─── Observability (logging + metrics) ───────────────────────────────────────
# Enables Workers Trace Events / Logpush and built-in request metrics in the
# Cloudflare dashboard. No extra code changes required.
#
# ⚠️  SAMPLING NOTE — these settings capture 100 % of telemetry (head_sampling_rate = 1)
# with persistence enabled.  This is intentional for the initial Worker rollout so
# that every request is visible while the deployment is stabilised.  Before this
# Worker handles significant production traffic you SHOULD:
#   • Lower head_sampling_rate to 0.1–0.25 (10–25 % sampling) in both
#     [observability.logs] and [observability.traces].
#   • Set persist = false unless long-term log retention is required — persisting
#     at high volume will incur Logpush / R2 storage costs.
#   • Consider disabling invocation_logs (or setting it false) once the Worker is
#     confirmed stable, as it logs every invocation even for fast cache-hit requests.
#   • Override these values per-environment by adding a [env.production] or
#     [env.staging] block that narrows the sampling rate for each tier.
[observability]
enabled = true
head_sampling_rate = 1   # TODO: reduce to 0.1–0.25 before high-traffic production

[observability.logs]
enabled = true
# NOTE: Sentry log drain destinations are configured in the Cloudflare dashboard,
# not in wrangler.toml — the `destinations` field is not part of the Wrangler schema
# and causes experimental_readRawConfig to throw on strict schema validation.
head_sampling_rate = 1   # TODO: reduce before high-traffic production
persist = true            # TODO: disable if long-term log retention is not needed
invocation_logs = true    # TODO: disable once Worker behaviour is confirmed stable

[observability.traces]
enabled = true
# NOTE: Sentry trace drain destinations are configured in the Cloudflare dashboard,
# not in wrangler.toml — the `destinations` field is not part of the Wrangler schema.
persist = true            # TODO: disable if long-term trace retention is not needed
head_sampling_rate = 1   # TODO: reduce before high-traffic production

# ─── Browser Rendering ────────────────────────────────────────────────────────
# Provides a headless Chromium instance at the edge via Cloudflare Browser Rendering.
# Usage: import { chromium } from '@cloudflare/playwright'
#        const browser = await chromium.launch(env.BROWSER)
# Requires Cloudflare Workers paid plan.
# IMPORTANT: Use [browser] (scalar table), NOT [[browser_rendering]] (array-of-tables).
# The [[browser_rendering]] syntax causes the binding to be silently ignored by wrangler.
[browser]
binding = "BROWSER"

# ─── Tail Worker ──────────────────────────────────────────────────────────────
# Tail worker binding for real-time log streaming and diagnostics.
# DISABLED: Commented out pending confirmation that the "bloqr-tail" Worker
# service exists in the account. If this service does not exist, wrangler rejects
# the config even on --dry-run. Uncomment once bloqr-tail is confirmed live.
# [[tail_consumers]]
# service = "bloqr-tail"

# ─── Route / Domain ───────────────────────────────────────────────────────────
# This route is configured for the current custom domain.
# Update pattern when the custom domain changes.
[[routes]]
pattern = "bloqr.dev"
custom_domain = true

[[routes]]
pattern = "mta-sts.bloqr.dev"
custom_domain = true

# PostHog analytics reverse-proxy subdomain.
# All requests to f.bloqr.dev are routed to handlePostHogProxy in src/worker.ts,
# which forwards them to us.i.posthog.com (events) or us-assets.posthog.com (JS).
# This keeps PostHog calls first-party and prevents ad-blocker interference.
# Must stay in sync with: src/config.ts POSTHOG_HOST, src/components/PostHog.astro api_host.
#
# override_existing_dns_record = true — the CNAME for f.bloqr.dev was manually
# created in the Cloudflare DNS dashboard before this wrangler.toml route existed.
# This flag tells wrangler to take ownership of the existing record rather than
# erroring with code 100117 ("already has externally managed DNS records").
[[routes]]
pattern = "f.bloqr.dev"
custom_domain = true
override_existing_dns_record = true

# ─── Environment Variables ───────────────────────────────────────────────────
# Non-secret Worker runtime vars. Secrets (DATABASE_URL, APOLLO_API_KEY, etc.)
# are set in the Cloudflare dashboard or .dev.vars for local dev.
[vars]
ENVIRONMENT = "production"
# CANONICAL_DOMAIN is read by the Worker at runtime (src/worker.ts) to gate
# X-Robots-Tag: noindex, nofollow on responses from non-canonical hosts.
CANONICAL_DOMAIN = "bloqr.dev"
PUBLIC_POSTHOG_KEY = "phc_pStjJrkLoRL42wUUAV4KqRX4UNMsurSwJFPn5m3hMNEf"
# Cloudflare Web Analytics beacon token.
# Find this in the CF dashboard → Web Analytics → your site → Manage site → Copy beacon token.
# IMPORTANT: CloudflareAnalytics.astro reads PUBLIC_CF_BEACON_TOKEN from
# import.meta.env, so Astro resolves it at BUILD TIME for prerendered HTML.
# Setting this only in wrangler.toml [vars] does NOT inject the beacon into the
# generated page output. The build environment must also provide the same
# PUBLIC_CF_BEACON_TOKEN value (for example via CI env vars or a build-time .env file).
# Keep the value here aligned with the build pipeline to avoid a silently-disabled beacon.
# Leave empty ("") in both places to disable the beacon intentionally.
PUBLIC_CF_BEACON_TOKEN = "c669b516a8e54055b08bf02e3fe8f438"
# Sender address for all outbound transactional email.
# Used by createEmailService() across all delivery strategies.
FROM_EMAIL = "Bloqr <hello@bloqr.dev>"
# ─── Functions / Waitlist edge handler ───────────────────────────────────────
# Routing is handled in src/worker.ts:
#   POST   /waitlist  → waitlist handler (Neon insert + Apollo sync)
#   OPTIONS /waitlist → CORS preflight
#   *                 → env.ASSETS.fetch(request)  (static site)
#
# ─── Neon branch → DATABASE_URL mapping ──────────────────────────────────────
#   production  ep-winter-term-a8rxh2a9-pooler       → bloqr-landing (production CF secret)
#   staging     ep-polished-resonance-a8mefek3-pooler → bloqr-landing (staging CF secret)
#   dev/jayson  ep-round-recipe-a8b3d3bd-pooler      → bloqr-landing (.dev.vars)
#
# ─── Required secrets (set in CF dashboard OR .dev.vars for local dev) ────────
# Workers → bloqr-landing → Settings → Environment variables
# Add as type "Secret" (encrypted at rest):
#
#   DATABASE_URL   — Neon bloqr database connection string (branch-specific, see above)
#   APOLLO_API_KEY — Apollo.io API key for contact enrichment
#   ADMIN_SECRET   — Password for /admin/config UI (any strong random string)
#
# ─── Better Auth secrets ──────────────────────────────────────────────────────
#   BETTER_AUTH_SECRET          — Random 32+ char string; signs/validates sessions
#                                  Generate with: openssl rand -base64 32  (REQUIRED)
#   BETTER_AUTH_URL             — Canonical origin for auth callbacks  (REQUIRED)
#                                  https://bloqr.dev
#   GITHUB_CLIENT_ID            — GitHub OAuth App client ID
#   GITHUB_CLIENT_SECRET        — GitHub OAuth App client secret
#   BETTER_AUTH_TRUSTED_ORIGINS — Optional; comma-separated trusted origins for cross-app SSO
#                                  Leave unset until app.bloqr.dev / docs.bloqr.dev are live
#
# GitHub OAuth App setup:  https://github.com/settings/developers
# Callback URLs to register on your GitHub OAuth App:
#   Production: https://bloqr.dev/api/auth/callback/github
#   Local dev:  http://localhost:4321/api/auth/callback/github
#
# Migration note: when domain changes —
#   1. Update BETTER_AUTH_URL secret → new canonical URL
#   2. Update /api/auth/callback/* in the GitHub OAuth App
#
# Local dev: values live in .dev.vars (gitignored), then run:
#   npm run preview   →  wrangler pages dev ./dist

# ─── CF Email Sending (outbound — native Workers binding) ─────────────────────
# Cloudflare Email Routing Workers binding for transactional outbound email.
# No third-party API key required — delivery authority is granted by this binding.
#
# Prerequisites:
#   1. Enable Cloudflare Email Routing on the bloqr.dev zone (CF dashboard → Email).
#   2. Verify the sending address (hello@bloqr.dev) as an allowed sender.
#   3. (Optional) Restrict sends to a single verified destination:
#        destination_address = "hello@bloqr.dev"
#      Omit to allow sending to all verified addresses in Email Routing.
#
# @see https://developers.cloudflare.com/email-routing/email-workers/send-email-workers/
[[send_email]]
name = "SEND_EMAIL"
# destination_address = "hello@bloqr.dev"

# ─── Email Worker service binding ────────────────────────────────────────────
# Routes outbound transactional email through the dedicated `bloqr-email`
# Cloudflare Worker instead of calling the SEND_EMAIL binding directly.
#
# When this binding is present, src/services/emailService.ts uses
# ServiceBindingStrategy (highest priority).
#
# The `bloqr-email` worker must exist in the same Cloudflare account.
# Activate by uncommenting the lines below:
#
# [[services]]
# binding = "EMAIL_WORKER"
# service = "bloqr-email"
#
# ─── Cloudflare Queues: bloqr-landing-email-queue ─────────────────────────────
# Durable, auto-retried email delivery queue.  Messages published here by
# the waitlist handler (or WaitlistSignupWorkflow) are consumed by the
# `handleEmailQueue` function in src/worker.ts.
#
# Setup (one-time, per environment):
#   wrangler queues create bloqr-landing-email-queue
#   wrangler queues create bloqr-landing-email-dlq
#
# Activate by uncommenting ALL THREE blocks below:
#
[[queues.producers]]
binding = "EMAIL_QUEUE"
queue   = "bloqr-landing-email-queue"
#
[[queues.producers]]
binding = "EMAIL_DLQ"
queue   = "bloqr-landing-email-dlq"
#
[[queues.consumers]]
queue             = "bloqr-landing-email-queue"
max_batch_size    = 10     # messages per consumer invocation
max_batch_timeout = 30     # seconds to wait for a full batch
max_retries       = 3      # per-message retry limit before DLQ routing
dead_letter_queue = "bloqr-landing-email-dlq"
#
# ─── Cloudflare Workflows: waitlist-signup ────────────────────────────────────
# Durable multi-step orchestration for post-signup side effects (email + Apollo).
# Requires the bloqr-landing-email-queue producer binding (EMAIL_QUEUE) to also
# be active (Step 1 publishes to it).  When WAITLIST_WORKFLOW is present it takes
# priority over EMAIL_QUEUE and direct send in functions/waitlist.ts.
#
# Activate by uncommenting the block below:
#
[[workflows]]
binding     = "WAITLIST_WORKFLOW"
name        = "waitlist-signup"
class_name  = "WaitlistSignupWorkflow"
script_name = "bloqr-landing"
#
# ─── Cloudflare Analytics Engine: bloqr_email_events ─────────────────────────
# Tracks email and signup lifecycle events (email_sent, waitlist_signup, etc.)
# without needing a third-party observability platform.
# Events are queryable via the CF Analytics Engine SQL API.
#
# Activate by uncommenting the block below:
#
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "bloqr_email_events"
#
# ─── KV: email deduplication ──────────────────────────────────────────────────
# Prevents duplicate confirmation emails on queue consumer retry.
# The consumer writes `email-sent:<message-id>` (TTL 24 h) after a
# successful send.  On retry, the key presence skips re-sending.
#
# Setup (one-time, per environment):
#   wrangler kv namespace create EMAIL_DEDUP
#   # Copy the id from the output and paste it below
#
# Activate by uncommenting and filling in the block below:
#
[[kv_namespaces]]
binding = "EMAIL_DEDUP_KV"
id      = "e6bd43ebed9c445fa1e85a0f9b3d39b9"
#
# ─── D1: bloqr-landing-email-db (email delivery log + custom template store) ──
# Purpose-built D1 SQLite edge database for email persistence.
#
# Tables (see scripts/migrations/001_email_db.sql for full schema):
#   email_sends     — immutable delivery log (one row per queue message processed)
#                     Writes: queue consumer after each attempt (sent/failed/stale/etc.)
#                     Reads:  GET /admin/email/logs with optional filters and pagination
#   email_templates — optional admin-editable template overrides
#                     Writes: PUT /admin/email/templates (creates or replaces)
#                     Reads:  queue consumer checks for custom version before compiling
#                             GET /admin/email/templates (admin listing)
#                     Delete: DELETE /admin/email/templates/:name (restores default)
#
# One-time setup — run scripts/setup-d1-email.sh, or manually:
#   1. wrangler d1 create bloqr-landing-email-db
#   2. Copy the database_id output below
#   3. wrangler d1 execute bloqr-landing-email-db --file scripts/migrations/001_email_db.sql
#   4. wrangler d1 execute bloqr-landing-email-db --file scripts/migrations/001_email_db.sql --remote
#
# Activate by uncommenting the block below:
#
[[d1_databases]]
binding       = "EMAIL_DB"
database_name = "bloqr-landing-email-db"
database_id   = "662fc37a-9246-476a-ac5c-2bf0c52124c3"
#
# ─── D1 Cache (site_config read-through cache) — RESERVED / FUTURE WORK ────────
# Intended to cache site_config rows from Neon for fast edge reads.
# The Worker does not yet read from or write to this binding; it is provisioned
# here so the D1 database exists and the binding name is reserved for when the
# implementation lands in src/worker.ts / functions/config.ts.
#
# One-time setup — see scripts/setup-d1-cache.sh, or run manually:
#   1. wrangler d1 create bloqr-landing-config-cache-db
#   2. Copy the database_id output below
#   3. wrangler d1 execute bloqr-landing-config-cache-db --command \
#        "CREATE TABLE IF NOT EXISTS config_cache (key TEXT PRIMARY KEY, value TEXT NOT NULL, cached_at INTEGER NOT NULL)"
#
[[d1_databases]]
binding = "BLOQR_CONFIG_CACHE_DB"
database_name = "bloqr-landing-config-cache-db"
database_id = "8d6153e2-9be1-470a-980b-9532a1850378"
