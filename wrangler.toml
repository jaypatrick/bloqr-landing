name = "adblock-landing"
compatibility_date = "2026-01-01"
pages_build_output_dir = "./dist"

# ─── Cloudflare Pages Functions ───────────────────────────────────────────────
# The `functions/` directory is auto-detected by Cloudflare Pages — no extra
# config needed. Functions run at the edge alongside the static output.
#
# Functions in this project:
#   functions/waitlist.ts  →  POST /waitlist
#     Writes email signups to Neon (adblock-db / adblock-compiler.waitlist)
#     and pushes contacts to Apollo.io (fire-and-forget, non-blocking).
#
# ─── Neon branch → DATABASE_URL mapping ──────────────────────────────────────
#   production  ep-winter-term-a8rxh2a9-pooler      → adblock-compiler (production CF secret)
#   staging     ep-polished-resonance-a8mefek3-pooler → adblock-compiler (staging CF secret)
#   dev/jayson  ep-round-recipe-a8b3d3bd-pooler     → adblock-compiler (.dev.vars)
#
# ─── Required secrets (set in CF dashboard OR .dev.vars for local dev) ────────
# Pages → adblock-landing → Settings → Environment variables
# Add both as type "Secret" (encrypted at rest):
#
#   DATABASE_URL   — Neon adblock-compiler connection string (branch-specific, see above)
#   APOLLO_API_KEY — Apollo.io API key for contact enrichment
#
# Local dev: values live in .dev.vars (gitignored), then run:
#   npm run preview   →  wrangler pages dev ./dist
#
# ─── D1 setup (one-time) ──────────────────────────────────────────────────────
# 1. Run: wrangler d1 create bloqr-config-cache
# 2. Copy the database_id into the [[d1_databases]] binding below
# 3. Run: wrangler d1 execute bloqr-config-cache --command "CREATE TABLE IF NOT EXISTS config_cache (key TEXT PRIMARY KEY, value TEXT NOT NULL, cached_at INTEGER NOT NULL)"

# ─── D1 Cache (site_config read-through cache) ────────────────────────────────
# Caches site_config rows from Neon for low-latency reads at the edge.
# Create with: wrangler d1 create bloqr-config-cache
# Then copy the database_id output into this binding.
#
[[d1_databases]]
binding = "CONFIG_CACHE"
database_name = "bloqr-config-cache"
database_id = "REPLACE_WITH_DATABASE_ID_AFTER_CREATION"
